name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

# Needs repo Settings > Actions > General: read/write + allow Actions to create PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        uses: google-github-actions/release-please-action@v4.1.0
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
